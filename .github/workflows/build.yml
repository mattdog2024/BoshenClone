name: 打包 Windows EXE

# 只允许手动触发，不再每次推送都自动打包
on:
  workflow_dispatch:  # 只在 GitHub 网页上手动点击才触发

jobs:
  build:
    runs-on: windows-latest  # 使用 GitHub 提供的 Windows 服务器

    steps:
      # 第1步：拉取最新代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 第2步：安装 Python 3.11
      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 第3步：安装所有依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install PySide6
          pip install rapidocr-onnxruntime
          pip install numpy opencv-python
          pip install pyinstaller

      # 第4步：用 PyInstaller 打包成单文件 exe
      - name: PyInstaller 打包
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "BoshenKaiLine_v3.3.0" `
            --hidden-import="rapidocr_onnxruntime" `
            --collect-all="rapidocr_onnxruntime" `
            main.py

      # 第5步：把打包好的 exe 上传为 Artifact（可在 Actions 页面下载）
      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: BoshenKaiLine_v3.3.0
          path: dist/BoshenKaiLine_v3.3.0.exe
          retention-days: 30  # 保留30天
