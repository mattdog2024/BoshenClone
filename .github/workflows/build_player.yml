name: Build DualScreenPlayer Windows EXE

on:
  push:
    paths:
      - 'DualScreenPlayer/**'
      - '.github/workflows/build_player.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install VLC via Chocolatey
        shell: powershell
        run: |
          Write-Host "Installing VLC via Chocolatey..."
          choco install vlc -y --no-progress
          $vlcPath = "C:\Program Files\VideoLAN\VLC"
          if (Test-Path $vlcPath) {
            Write-Host "VLC installed at: $vlcPath"
            echo "$vlcPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            # Try x86 path
            $vlcPath = "C:\Program Files (x86)\VideoLAN\VLC"
            Write-Host "VLC installed at: $vlcPath"
            echo "$vlcPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          # List VLC files
          Get-ChildItem $vlcPath | Select-Object Name | Format-Table

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.9 python-vlc Pillow mutagen pyinstaller

      - name: Build EXE with PyInstaller
        shell: powershell
        working-directory: DualScreenPlayer
        run: |
          # Find VLC path
          $vlcPath = "C:\Program Files\VideoLAN\VLC"
          if (-not (Test-Path $vlcPath)) {
            $vlcPath = "C:\Program Files (x86)\VideoLAN\VLC"
          }
          Write-Host "Using VLC from: $vlcPath"
          
          # Find plugins dir
          $pluginsDir = Join-Path $vlcPath "plugins"
          
          pyinstaller --noconfirm --onedir --windowed `
            --name "DualScreenPlayer" `
            --add-binary "$vlcPath\libvlc.dll;." `
            --add-binary "$vlcPath\libvlccore.dll;." `
            --add-binary "$pluginsDir;plugins" `
            --hidden-import vlc `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import PyQt5.QtMultimedia `
            --collect-all vlc `
            main.py

      - name: Create portable ZIP
        shell: powershell
        working-directory: DualScreenPlayer
        run: |
          $zipName = "DualScreenPlayer_v1.0_Windows_Portable.zip"
          Compress-Archive -Path "dist\DualScreenPlayer\*" -DestinationPath $zipName -Force
          $size = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "ZIP created: $zipName ($size MB)"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DualScreenPlayer-Windows-Portable
          path: DualScreenPlayer/DualScreenPlayer_v1.0_Windows_Portable.zip
          retention-days: 30
