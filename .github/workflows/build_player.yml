name: Build DualScreenPlayer Windows EXE

on:
  push:
    paths:
      - 'DualScreenPlayer/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install VLC (64-bit)
        shell: powershell
        run: |
          $vlcUrl = "https://get.videolan.org/vlc/3.0.21/win64/vlc-3.0.21-win64.exe"
          $vlcInstaller = "$env:TEMP\vlc-installer.exe"
          Write-Host "Downloading VLC..."
          Invoke-WebRequest -Uri $vlcUrl -OutFile $vlcInstaller -UseBasicParsing
          Write-Host "Installing VLC silently..."
          Start-Process -FilePath $vlcInstaller -ArgumentList "/S" -Wait
          Write-Host "VLC installed."
          # Add VLC to PATH
          $vlcPath = "C:\Program Files\VideoLAN\VLC"
          echo "$vlcPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Copy libvlc.dll to Python dir for python-vlc
          Copy-Item "$vlcPath\libvlc.dll" "C:\hostedtoolcache\windows\Python\3.10.*\x64\libvlc.dll" -ErrorAction SilentlyContinue
          Copy-Item "$vlcPath\libvlccore.dll" "C:\hostedtoolcache\windows\Python\3.10.*\x64\libvlccore.dll" -ErrorAction SilentlyContinue

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.9 python-vlc Pillow mutagen pyinstaller

      - name: Build EXE with PyInstaller
        shell: cmd
        working-directory: DualScreenPlayer
        run: |
          set VLC_PATH=C:\Program Files\VideoLAN\VLC
          pyinstaller --noconfirm --onedir --windowed ^
            --name "DualScreenPlayer" ^
            --add-binary "%VLC_PATH%\libvlc.dll;." ^
            --add-binary "%VLC_PATH%\libvlccore.dll;." ^
            --add-binary "%VLC_PATH%\plugins;plugins" ^
            --hidden-import vlc ^
            --hidden-import PyQt5.QtCore ^
            --hidden-import PyQt5.QtGui ^
            --hidden-import PyQt5.QtWidgets ^
            --hidden-import PyQt5.QtMultimedia ^
            --collect-all vlc ^
            main.py

      - name: Create portable ZIP
        shell: powershell
        working-directory: DualScreenPlayer
        run: |
          $src = "dist\DualScreenPlayer"
          $dst = "DualScreenPlayer_v1.0_Windows_便携版.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force
          Write-Host "ZIP created: $dst"
          Get-Item $dst | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DualScreenPlayer-Windows-Portable
          path: DualScreenPlayer/DualScreenPlayer_v1.0_Windows_便携版.zip
          retention-days: 30
