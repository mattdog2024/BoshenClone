name: Build DualScreenPlayer v2 Windows EXE

on:
  push:
    paths:
      - 'DualScreenPlayer_v2/**'
      - '.github/workflows/build_player_v2.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.9 Pillow pyinstaller

      - name: Verify imports
        shell: cmd
        working-directory: DualScreenPlayer_v2
        run: |
          python -c "from PyQt5.QtWidgets import QApplication; from PyQt5.QtMultimedia import QMediaPlayer; from PyQt5.QtMultimediaWidgets import QVideoWidget; print('All imports OK')"

      - name: Build EXE with PyInstaller
        shell: cmd
        working-directory: DualScreenPlayer_v2
        run: |
          pyinstaller --noconfirm --onedir --windowed ^
            --name "DualScreenPlayer" ^
            --hidden-import PyQt5.QtCore ^
            --hidden-import PyQt5.QtGui ^
            --hidden-import PyQt5.QtWidgets ^
            --hidden-import PyQt5.QtMultimedia ^
            --hidden-import PyQt5.QtMultimediaWidgets ^
            --hidden-import PyQt5.sip ^
            main.py

      - name: Verify EXE exists
        shell: powershell
        working-directory: DualScreenPlayer_v2
        run: |
          $exePath = "dist\DualScreenPlayer\DualScreenPlayer.exe"
          if (Test-Path $exePath) {
            $size = [math]::Round((Get-Item $exePath).Length / 1MB, 1)
            Write-Host "EXE built successfully: $size MB"
          } else {
            Write-Error "EXE not found!"
            exit 1
          }

      - name: Create portable ZIP
        shell: powershell
        working-directory: DualScreenPlayer_v2
        run: |
          $zipName = "DualScreenPlayer_v2.0_Windows_Portable.zip"
          Compress-Archive -Path "dist\DualScreenPlayer\*" -DestinationPath $zipName -Force
          $size = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "ZIP created: $zipName ($size MB)"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DualScreenPlayer-v2-Windows-Portable
          path: DualScreenPlayer_v2/DualScreenPlayer_v2.0_Windows_Portable.zip
          retention-days: 30
