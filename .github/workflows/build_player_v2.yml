name: Build DualScreenPlayer v3 Windows EXE

on:
  push:
    paths:
      - 'DualScreenPlayer_v2/**'
      - '.github/workflows/build_player_v2.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.9 python-vlc Pillow pyinstaller

      - name: Install VLC via Chocolatey
        shell: powershell
        run: |
          Write-Host "Installing VLC..."
          choco install vlc --yes --no-progress 2>&1
          $vlcPath = "C:\Program Files\VideoLAN\VLC"
          if (Test-Path $vlcPath) {
            Write-Host "VLC installed at: $vlcPath"
            Get-ChildItem $vlcPath -Filter "*.dll" | Select-Object -First 5 | ForEach-Object { Write-Host $_.Name }
          } else {
            Write-Error "VLC installation failed!"
            exit 1
          }

      - name: Verify VLC + python-vlc
        shell: powershell
        run: |
          $env:PATH = "C:\Program Files\VideoLAN\VLC;" + $env:PATH
          python -c "
          import os, sys
          vlc_dir = r'C:\Program Files\VideoLAN\VLC'
          os.environ['PATH'] = vlc_dir + os.pathsep + os.environ.get('PATH','')
          try:
              os.add_dll_directory(vlc_dir)
          except Exception:
              pass
          import vlc
          inst = vlc.Instance()
          print('VLC OK, version:', vlc.libvlc_get_version())
          inst.release()
          "

      - name: Build EXE with PyInstaller (include VLC dlls)
        shell: powershell
        working-directory: DualScreenPlayer_v2
        run: |
          $vlcDir = "C:\Program Files\VideoLAN\VLC"
          $env:PATH = "$vlcDir;" + $env:PATH

          # 收集 VLC 所有 dll 和 plugins
          $addData = @()
          $addData += "--add-data `"$vlcDir\libvlc.dll;.`""
          $addData += "--add-data `"$vlcDir\libvlccore.dll;.`""
          if (Test-Path "$vlcDir\plugins") {
            $addData += "--add-data `"$vlcDir\plugins;plugins`""
          }

          $addDataStr = $addData -join " "

          $cmd = "pyinstaller --noconfirm --onedir --windowed " +
            "--name DualScreenPlayer " +
            "--hidden-import PyQt5.QtCore " +
            "--hidden-import PyQt5.QtGui " +
            "--hidden-import PyQt5.QtWidgets " +
            "--hidden-import PyQt5.sip " +
            "--hidden-import vlc " +
            "$addDataStr " +
            "main.py"

          Write-Host "Running: $cmd"
          Invoke-Expression $cmd

      - name: Verify EXE exists
        shell: powershell
        working-directory: DualScreenPlayer_v2
        run: |
          $exePath = "dist\DualScreenPlayer\DualScreenPlayer.exe"
          if (Test-Path $exePath) {
            $size = [math]::Round((Get-Item $exePath).Length / 1MB, 1)
            Write-Host "EXE built successfully: $size MB"
            $distSize = [math]::Round((Get-ChildItem "dist\DualScreenPlayer" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
            Write-Host "Total dist size: $distSize MB"
          } else {
            Write-Error "EXE not found!"
            exit 1
          }

      - name: Create portable ZIP
        shell: powershell
        working-directory: DualScreenPlayer_v2
        run: |
          $zipName = "DualScreenPlayer_v3.0_Windows_Portable.zip"
          Compress-Archive -Path "dist\DualScreenPlayer\*" -DestinationPath $zipName -Force
          $size = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "ZIP created: $zipName ($size MB)"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DualScreenPlayer-v3-Windows-Portable
          path: DualScreenPlayer_v2/DualScreenPlayer_v3.0_Windows_Portable.zip
          retention-days: 30
